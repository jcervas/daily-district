<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Daily District — {{DIST_ID}}</title>
<style>
/*{{FONTS_CSS}}*/

:root{
  --red:#C41230;
  --ink:#1a1a1a;
  --muted:#6b6b74;
  --bg:#f4f3f1;
  --card:#ffffff;
  --gold:#F4B733;
  --line:#e7e4e0;
  --blue:#2f6fd0;
  --green:#1f7a3d;
  --stageW:{{STAGE_W}}px;
  --stageH:{{STAGE_H}}px;
  font-family:'Barlow',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#0e0e11;overflow:hidden}
body{display:flex;align-items:center;justify-content:center}
body.clean{background:#f4f3f1}
body.clean #stage{border-radius:0;box-shadow:none}

/* ── Stage ─────────────────────────────────────────────── */
#stage{
  position:relative;width:var(--stageW);height:var(--stageH);
  background:var(--bg);overflow:hidden;
  border-radius:14px;box-shadow:0 30px 90px rgba(0,0,0,.5);
  transform-origin:center center;
}

/* Background: soft warm blooms + faint red tint (from the promo) */
#bg{position:absolute;inset:0;
  background:
    radial-gradient(120% 90% at 50% -12%, #ffffff 0%, rgba(255,255,255,0) 52%),
    radial-gradient(70% 70% at 10% 6%, rgba(196,18,48,.11) 0%, rgba(196,18,48,0) 46%),
    radial-gradient(70% 70% at 93% 97%, rgba(196,18,48,.13) 0%, rgba(196,18,48,0) 50%),
    linear-gradient(160deg,#f8f6f4 0%,#eeeae6 100%);
}

/* ── Tile background — the floating district pills, reusable decor ───────── */
#tiles{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.tile{position:absolute;display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.62);border:1px solid rgba(196,18,48,.10);
  border-radius:999px;padding:8px 15px 8px 11px;
  box-shadow:0 8px 22px rgba(40,20,25,.06);
  font-weight:800;font-size:15px;color:#b3a7aa;white-space:nowrap}
.tile i{width:15px;height:15px;border-radius:4px;background:rgba(196,18,48,.35);display:block}

/* ── Confetti ───────────────────────────────────────────── */
#confetti{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.conf{position:absolute;width:13px;height:19px;border-radius:2px}

/* ── Content column ─────────────────────────────────────── */
#wrap{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:var(--gap);padding:var(--pad)}

.badge{display:inline-flex;align-items:center;gap:12px;background:var(--red);color:#fff;
  font-weight:800;letter-spacing:2.6px;text-transform:uppercase;
  font-size:22px;padding:11px 22px;border-radius:999px;box-shadow:0 12px 28px rgba(196,18,48,.24)}

/* Hero: silhouette + big district id */
.hero{display:flex;align-items:center;justify-content:center;gap:40px}
.sil{filter:drop-shadow(0 22px 38px rgba(196,18,48,.22));flex:0 0 auto}
.sil path{fill:var(--red)}
.title{display:flex;flex-direction:column;gap:6px}
.title .id{font-weight:900;font-size:150px;line-height:.86;letter-spacing:-5px;color:var(--ink)}
.title .place{font-weight:800;font-size:34px;color:var(--muted);letter-spacing:-.4px}

/* Stat cards (from the promo win scene) */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:20px;width:100%;max-width:900px}
.stats.three{grid-template-columns:1fr 1fr 1fr}
.stats.three .stat{padding:24px 22px;text-align:center}
.stats.three .val{font-size:52px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:20px;
  padding:24px 28px;box-shadow:0 22px 48px rgba(40,20,25,.10)}
.stat .lab{font-weight:800;letter-spacing:1.4px;font-size:16px;color:var(--muted);text-transform:uppercase}
.stat .val{font-weight:900;font-size:44px;color:var(--ink);margin-top:8px;line-height:1;letter-spacing:-1px}
.stat .sub2{font-weight:700;font-size:20px;color:var(--muted);margin-top:8px}

/* Footer */
.footer{display:flex;flex-direction:column;align-items:center;gap:10px;margin-top:2px}
.footer .wm{color:var(--red);width:340px}
.footer .wm svg{display:block;width:100%;height:auto}
.footer .cta{font-weight:800;font-size:24px;color:var(--muted)}
.footer .cta b{color:var(--red)}

/* ── Aspect: square 1:1 (1080×1080) ─────────────────────── */
body[data-aspect="1x1"]{--gap:34px;--pad:62px}

/* ── Aspect: portrait 9:16 (1080×1920) ──────────────────── */
body[data-aspect="9x16"]{--gap:54px;--pad:90px}
body[data-aspect="9x16"] .title .id{font-size:176px}
body[data-aspect="9x16"] .stats{grid-template-columns:1fr;max-width:820px}
body[data-aspect="9x16"] .stat .val{font-size:48px}
body[data-aspect="9x16"] .footer .wm{width:420px}
</style>
</head>
<body data-aspect="{{ASPECT}}">

<div id="stage">
  <div id="bg"></div>
  <div id="tiles"></div>
  <div id="confetti"></div>

  <div id="wrap">
    <span class="badge">{{BADGE}}</span>

    <div class="hero">
      <svg class="sil" width="{{SIL_DISP}}" height="{{SIL_DISP}}" viewBox="0 0 {{SIL_BOX}} {{SIL_BOX}}">
        <path d="{{SIL_PATH}}"/>
      </svg>
      <div class="title">
        <span class="id">{{DIST_ID}}</span>
        <span class="place">{{PLACE}}</span>
      </div>
    </div>

    <div class="stats {{STATS_MOD}}">{{STAT_CARDS}}</div>

    <div class="footer">
      <span class="wm"><svg viewBox="0 0 260 56" role="img" aria-label="Daily District">{{WORDMARK}}</svg></span>
      <span class="cta">New district every day · <b>daily-district.com</b></span>
    </div>
  </div>
</div>

<script>
// ── Tile background: faint district pills scattered to the periphery ────────
// Curated positions [label, x%, y%] hug the edges so they never fight the
// centred content. Reuse this list for any future social post.
(function(){
  // Positions hug the corners/edges so pills never sit under the stat cards
  // (the card band is roughly x 7–93%, y 48–80%). Reuse for future posts.
  const items=[
    ["OHIO",6,9],["AZ-03",67,10],["PA-08",85,7],["FL-27",20,19],["NY-14",91,20],
    ["CO-06",4,40],["WA-07",96,44],["CA-12",3,64],["TEXAS",97,66],
    ["GA-05",6,87],["NC-02",18,93],["VA-10",41,96],["IL-12",71,94],["MI-11",94,86]
  ];
  const box=document.getElementById('tiles');
  items.forEach(([n,x,y],i)=>{
    const el=document.createElement('div');el.className='tile';
    el.innerHTML='<i></i>'+n;
    el.style.left=x+'%';el.style.top=y+'%';
    el.style.transform='translate(-50%,-50%) rotate('+(((i*37)%9)-4)+'deg)';
    el.style.fontSize=(13+(i%3)*2)+'px';
    box.appendChild(el);
  });
})();

// ── Confetti: a frozen burst (deterministic, static — no animation) ─────────
(function(){
  const COLORS=['#C41230','#F4B733','#1f7a3d','#2f6fd0','#e01a3c','#111'];
  const box=document.getElementById('confetti');
  const N=94;
  for(let i=0;i<N;i++){
    const h=(i*2654435761)>>>0;                     // cheap deterministic hash
    const x=(h%1000)/10;                            // 0..100 %
    // Bias vertically toward the upper burst, thinning lower down.
    const yr=((h>>10)%1000)/1000;
    const y=Math.pow(yr,1.7)*88 + 1;                // 1..~89 %
    const rot=((h>>3)%360);
    const sc=0.7+((h>>7)%60)/100;
    const c=document.createElement('div');c.className='conf';
    c.style.left=x+'%';c.style.top=y+'%';
    c.style.background=COLORS[i%COLORS.length];
    c.style.transform='rotate('+rot+'deg) scale('+sc.toFixed(2)+')';
    c.style.opacity=(0.78+((h>>5)%22)/100).toFixed(2);
    box.appendChild(c);
  }
})();

// Full-bleed capture mode (no dark frame / shadow) when exporting a PNG.
if(location.hash==='#shot'||location.search.includes('shot')) document.body.classList.add('clean');

// ── Fit stage to window (preview only; export screenshots the full window) ──
function fit(){
  const pad=document.body.classList.contains('clean')?0:48;
  const s=Math.min(1,(window.innerWidth-pad)/{{STAGE_W}},(window.innerHeight-pad)/{{STAGE_H}});
  document.getElementById('stage').style.transform='scale('+s+')';
}
window.addEventListener('resize',fit);fit();
if(document.fonts&&document.fonts.ready){document.fonts.ready.then(fit);}
</script>
</body>
</html>
