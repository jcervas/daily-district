<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Daily District — Teaser #2 (District Profiles)</title>
<style>
/*{{FONTS_CSS}}*/

:root{
  --red:#C41230; --ink:#1a1a1a; --muted:#6b6b74; --bg:#f4f3f1; --card:#ffffff;
  --line:#e7e4e0; --blue:#2f6fd0;
  --stageW:{{STAGE_W}}px; --stageH:{{STAGE_H}}px;
  font-family:'Barlow',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#0e0e11;overflow:hidden}
body{display:flex;align-items:center;justify-content:center}

#stage{position:relative;width:var(--stageW);height:var(--stageH);background:var(--bg);
  overflow:hidden;border-radius:14px;box-shadow:0 30px 90px rgba(0,0,0,.5);
  transform-origin:center center;perspective:1500px}
body.clean{background:#f4f3f1}
body.clean #stage{border-radius:0;box-shadow:none}

#bg{position:absolute;inset:0;
  background:
    radial-gradient(120% 90% at 50% -12%, #ffffff 0%, rgba(255,255,255,0) 52%),
    radial-gradient(70% 70% at 8% 6%, rgba(196,18,48,.10) 0%, rgba(196,18,48,0) 46%),
    radial-gradient(70% 70% at 94% 96%, rgba(196,18,48,.12) 0%, rgba(196,18,48,0) 50%),
    linear-gradient(160deg,#f8f6f4 0%,#eeeae6 100%)}

.scene{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  will-change:transform,filter,opacity;backface-visibility:hidden;opacity:0}
.scene .wrap{position:relative;width:100%;height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center}
[data-anim]{opacity:0;will-change:transform,opacity}

/* wordmark scenes */
.wordmark{color:var(--red);display:block}
.wordmark svg{display:block;width:100%;height:auto}
.eyebrow{font-weight:800;letter-spacing:2.8px;text-transform:uppercase;color:var(--red);font-size:22px}
.sub{font-weight:700;color:var(--muted);font-size:30px;text-align:center;max-width:80%}
.redword{color:var(--red)} .ink{color:var(--ink)}
.cta-url{font-weight:900;font-size:60px;color:var(--red);letter-spacing:-1px}

/* district scene */
.dhead{display:flex;flex-direction:column;align-items:center;gap:2px;margin-bottom:8px}
.deyebrow{font-weight:800;letter-spacing:2.6px;text-transform:uppercase;color:var(--red);font-size:19px}
.did{font-weight:900;font-size:104px;line-height:.92;color:var(--ink);letter-spacing:-2px}
.dstate{font-weight:700;font-size:24px;color:var(--muted)}
.dshape{width:440px;height:440px;overflow:visible;filter:drop-shadow(0 20px 34px rgba(196,18,48,.18))}
.dshape .dfill{fill:var(--red);opacity:0}
.dshape .dline{fill:none;stroke:var(--red);stroke-width:6;stroke-linejoin:round;stroke-linecap:round}
.dcards{display:flex;gap:16px;margin-top:12px}
.dcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 22px;
  min-width:300px;box-shadow:0 20px 44px rgba(40,20,25,.10);text-align:left}
.dcard .lab{font-weight:800;letter-spacing:1.2px;font-size:12px;color:var(--muted);text-transform:uppercase}
.dcard .val{font-weight:900;font-size:32px;color:var(--ink);margin-top:3px;line-height:1}
.dcard .sub2{font-weight:700;font-size:15px;color:var(--muted);margin-top:4px}

/* controls */
#controls{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:10px;
  align-items:center;z-index:1000;background:rgba(20,20,24,.86);backdrop-filter:blur(8px);
  border-radius:14px;padding:10px 14px;font-family:'Barlow',sans-serif}
body.clean #controls{display:none}
#controls button{font-family:inherit;font-weight:800;font-size:14px;border:0;border-radius:9px;
  padding:9px 15px;cursor:pointer;background:#2f2f36;color:#fff}
#controls button.primary{background:var(--red)}
#controls button:hover{filter:brightness(1.12)}
#controls .status{color:#c9c7cf;font-size:13px;font-weight:600;min-width:120px}
#hint-cue{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:1000;
  background:rgba(20,20,24,.8);color:#eee;font-weight:600;font-size:12.5px;padding:6px 12px;border-radius:8px}
body.clean #hint-cue{display:none}

/* portrait / square tuning */
body[data-aspect="1x1"] .did{font-size:112px}
body[data-aspect="1x1"] .dshape{width:400px;height:400px}
body[data-aspect="1x1"] .dcards{flex-direction:column;gap:12px;align-items:center}
body[data-aspect="1x1"] .dcard{min-width:520px;display:flex;justify-content:space-between;align-items:center}
body[data-aspect="1x1"] .dcard .val{font-size:30px}
body[data-aspect="9x16"] .dcards{flex-direction:column;align-items:center}
body[data-aspect="9x16"] .dcard{min-width:620px;display:flex;justify-content:space-between;align-items:center}
body[data-aspect="9x16"] .dshape{width:620px;height:620px}
body[data-aspect="9x16"] .did{font-size:150px}
body[data-aspect="9x16"] .cap{bottom:170px;font-size:38px}

/* landscape 16:9 (1280×720) — compress the district scene vertically */
body[data-aspect="16x9"] .dhead{margin-bottom:4px}
body[data-aspect="16x9"] .deyebrow{font-size:16px}
body[data-aspect="16x9"] .did{font-size:70px;letter-spacing:-1px}
body[data-aspect="16x9"] .dstate{font-size:19px}
body[data-aspect="16x9"] .dshape{width:280px;height:280px}
body[data-aspect="16x9"] .dcards{margin-top:8px;gap:12px}
body[data-aspect="16x9"] .dcard{min-width:250px;padding:11px 16px}
body[data-aspect="16x9"] .dcard .val{font-size:24px}
body[data-aspect="16x9"] .dcard .sub2{font-size:13px}
body[data-aspect="16x9"] .wordmark[style]{width:560px!important}
body[data-aspect="16x9"] .cta-url{font-size:48px}
body[data-aspect="16x9"] .cap{bottom:26px;font-size:24px}
</style>
</head>
<body data-aspect="{{ASPECT}}">

<div id="stage">
  <div id="bg"></div>

  <!-- FRONT: wordmark -->
  <section class="scene" data-scene="intro">
    <div class="wrap">
      <span class="eyebrow" data-anim="pop" data-d="0.05">435 districts, explained</span>
      <div class="wordmark" data-anim="pop" data-d="0.18" style="width:760px;margin:24px 0 14px"><svg viewBox="0 0 260 56" role="img" aria-label="Daily District">{{WORDMARK}}</svg></div>
      <div class="sub" data-anim="rise" data-d="0.42">Every U.S. House district — its <b class="redword">shape, representative, elections &amp; people.</b></div>
    </div>
  </section>

  <!-- district scenes injected here by JS -->

  <!-- BACK: wordmark + CTA -->
  <section class="scene" data-scene="cta">
    <div class="wrap">
      <div class="wordmark" data-anim="pop" data-d="0.05" style="width:620px;margin-bottom:22px"><svg viewBox="0 0 260 56" role="img" aria-label="Daily District">{{WORDMARK}}</svg></div>
      <div class="sub" data-anim="rise" data-d="0.22" style="font-size:31px;color:var(--ink)">Explore <b class="redword">all 435 district profiles.</b></div>
      <div class="cta-url" data-anim="pop" data-d="0.42" style="margin-top:16px">daily-district.com</div>
    </div>
  </section>
</div>

<div id="hint-cue">▶ Teaser #2 · loop · press <b>Record video</b> and share <b>This Tab</b> to export</div>
<div id="controls">
  <button class="primary" id="btn-rec">● Record video</button>
  <button id="btn-restart">↻ Restart</button>
  <button id="btn-clean">Hide UI</button>
  <span class="status" id="status">{{STAGE_W}}×{{STAGE_H}} · teaser #2</span>
</div>

<script>
const DISTRICTS = {{DISTRICTS_JSON}};

// ── Build district scenes (inserted before the CTA) ────────────────────────
const stage = document.getElementById('stage');
const ctaEl = document.querySelector('.scene[data-scene="cta"]');
DISTRICTS.forEach((d, i) => {
  const sec = document.createElement('section');
  sec.className = 'scene'; sec.dataset.scene = 'd' + i;
  const cards = d.cards.map((c, j) => {
    const d0 = (0.34 + j * 0.13).toFixed(2);
    const valStyle = c.color ? ` style="color:${c.color}"` : '';
    const sub = c.sub ? `<div class="sub2">${c.sub}</div>` : '';
    return `<div class="dcard" data-anim="rise" data-d="${d0}"><div class="lab">${c.label}</div><div class="val"${valStyle}>${c.value}</div>${sub}</div>`;
  }).join('');
  sec.innerHTML = `<div class="wrap">
      <div class="dhead">
        <span class="deyebrow" data-anim="rise" data-d="0.06">District Profile</span>
        <span class="did" data-anim="pop" data-d="0.12">${d.id}</span>
        <span class="dstate" data-anim="rise" data-d="0.20">${d.state}</span>
      </div>
      <svg class="dshape" viewBox="0 0 ${d.box} ${d.box}" aria-hidden="true">
        <path class="dfill" d="${d.path}"/>
        <path class="dline" d="${d.path}"/>
      </svg>
      <div class="dcards">${cards}</div>
    </div>`;
  stage.insertBefore(sec, ctaEl);
});

// ── Timeline ───────────────────────────────────────────────────────────────
const easeOut=t=>1-Math.pow(1-t,3), easeIn=t=>t*t*t;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v)), lerp=(a,b,t)=>a+(b-a)*t;

const FRONT=2.4, SHOT=2.7, BACK=2.7;
const SCENES=[{name:'intro',t0:0,t1:FRONT,dir:1,ax:'y'}];
DISTRICTS.forEach((d,i)=>{ const t0=FRONT+i*SHOT; SCENES.push({name:'d'+i,t0,t1:t0+SHOT,dir:(i%2?-1:1),ax:'x',draw:true}); });
{ const t0=FRONT+DISTRICTS.length*SHOT; SCENES.push({name:'cta',t0,t1:t0+BACK,dir:-1,ax:'x'}); }
const LOOP=SCENES[SCENES.length-1].t1;
const ENTER=0.5, EXIT=0.46, TRAVEL=560, BLURMAX=20, CHILD=0.5;

SCENES.forEach(s=>{
  s.el=document.querySelector(`.scene[data-scene="${s.name}"]`);
  s.kids=[...s.el.querySelectorAll('[data-anim]')].map(n=>({n,type:n.dataset.anim,d:parseFloat(n.dataset.d)||0}));
  if(s.draw){ s.line=s.el.querySelector('.dline'); s.fill=s.el.querySelector('.dfill');
    s.len=s.line.getTotalLength(); s.line.style.strokeDasharray=s.len; s.line.style.strokeDashoffset=s.len; }
});

function revealKids(s,lt){
  for(const k of s.kids){ const p=easeOut(clamp((lt-k.d)/CHILD,0,1));
    let tf=''; if(k.type==='pop')tf=`scale(${lerp(.72,1,p)})`; else if(k.type==='rise')tf=`translateY(${lerp(30,0,p)}px)`;
    k.n.style.opacity=p.toFixed(3); k.n.style.transform=tf; }
}

let startTs=null, paused=false, pauseAt=0;
window.__teaser={seek:t=>{paused=true;pauseAt=((t%LOOP)+LOOP)%LOOP;},play:()=>{paused=false;startTs=null;},loop:()=>LOOP};

function frame(ts){
  if(startTs===null) startTs=ts;
  const t = paused ? pauseAt : ((ts-startTs)/1000)%LOOP;
  for(const s of SCENES){
    const el=s.el, lt=t-s.t0, dur=s.t1-s.t0;
    if(t<s.t0-0.02 || t>=s.t1+0.02){ el.style.opacity='0'; el.style.filter='none'; continue; }
    let x=0,y=0,sc=1,bl=0,op=1,ry=0;
    if(lt<ENTER){ const p=easeOut(clamp(lt/ENTER,0,1)); const off=(1-p)*TRAVEL*s.dir;
      if(s.ax==='x')x=off; else y=off*0.7; sc=1.08-0.08*p; bl=BLURMAX*(1-p); op=clamp(p*1.6,0,1); ry=(s.ax==='x')?s.dir*8*(1-p):0; }
    else if(lt>dur-EXIT){ const p=easeIn(clamp((lt-(dur-EXIT))/EXIT,0,1)); const off=-p*TRAVEL*s.dir;
      if(s.ax==='x')x=off; else y=off*0.7; sc=1-0.05*p; bl=BLURMAX*p; op=clamp(1-p*1.35,0,1); ry=(s.ax==='x')?-s.dir*9*p:0; }
    else { const hp=(lt-ENTER)/(dur-ENTER-EXIT); sc=1+0.028*hp; y=-7*hp; }
    el.style.opacity=op.toFixed(3);
    el.style.filter = bl>0.05?`blur(${bl.toFixed(1)}px)`:'none';
    el.style.transform=`translate3d(${x.toFixed(1)}px,${y.toFixed(1)}px,0) scale(${sc.toFixed(3)}) rotateY(${ry.toFixed(1)}deg)`;
    revealKids(s,lt);
    if(s.draw){ const dp=easeOut(clamp((lt-0.18)/0.95,0,1)); s.line.style.strokeDashoffset=(s.len*(1-dp)).toFixed(1);
      s.fill.style.opacity=(clamp((lt-0.8)/0.6,0,1)*0.16).toFixed(3); }
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// ── Controls + record (same as promo) ──────────────────────────────────────
const statusEl=document.getElementById('status');
document.getElementById('btn-restart').onclick=()=>{startTs=null;paused=false;};
document.getElementById('btn-clean').onclick=()=>{document.body.classList.toggle('clean');fit();};
window.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault(); if(paused){paused=false;startTs=performance.now()-pauseAt*1000;} else {paused=true;pauseAt=((performance.now()-(startTs||performance.now()))/1000)%LOOP;}}
  if(e.key==='r'||e.key==='R'){startTs=null;paused=false;}
  if(e.key==='h'||e.key==='H'){document.body.classList.toggle('clean');fit();}
});

let rec, chunks=[];
document.getElementById('btn-rec').onclick=async ()=>{
  try{
    statusEl.textContent='Choose “This Tab”…';
    const stream=await navigator.mediaDevices.getDisplayMedia({video:{frameRate:30,width:{{STAGE_W}},height:{{STAGE_H}}},audio:false,preferCurrentTab:true});
    document.body.classList.add('clean'); fit(); startTs=null; paused=false; chunks=[];
    const mime=MediaRecorder.isTypeSupported('video/mp4')?'video/mp4':MediaRecorder.isTypeSupported('video/webm;codecs=vp9')?'video/webm;codecs=vp9':'video/webm';
    rec=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:12_000_000});
    rec.ondataavailable=e=>{if(e.data.size)chunks.push(e.data);};
    rec.onstop=()=>{stream.getTracks().forEach(t=>t.stop());
      const blob=new Blob(chunks,{type:mime});const a=document.createElement('a');
      a.href=URL.createObjectURL(blob);a.download='daily-district-teaser-3.'+(mime.includes('mp4')?'mp4':'webm');a.click();
      document.body.classList.remove('clean');fit();statusEl.textContent='Saved '+a.download;};
    rec.start();
    const total=Math.round(LOOP*1000)+300; let left=Math.ceil(total/1000);
    statusEl.textContent='● Recording '+left+'s…';
    const iv=setInterval(()=>{left--;statusEl.textContent='● Recording '+left+'s…';},1000);
    setTimeout(()=>{clearInterval(iv);if(rec&&rec.state!=='inactive')rec.stop();},total);
    stream.getVideoTracks()[0].onended=()=>{if(rec&&rec.state!=='inactive')rec.stop();};
  }catch(err){statusEl.textContent='Record cancelled';document.body.classList.remove('clean');fit();}
};

function fit(){
  const pad=document.body.classList.contains('clean')?0:56;
  const s=Math.min(1,(window.innerWidth-pad)/{{STAGE_W}},(window.innerHeight-pad)/{{STAGE_H}});
  document.getElementById('stage').style.transform=`scale(${s})`;
}
window.addEventListener('resize',fit); fit();
if(document.fonts&&document.fonts.ready){document.fonts.ready.then(fit);}
</script>
</body>
</html>
