<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Daily District ŌĆö Teaser #6 (Play to Win)</title>
<style>
/*{{FONTS_CSS}}*/

:root{
  --red:#C41230; --ink:#1a1a1a; --muted:#6b6b74; --bg:#f4f3f1; --card:#ffffff;
  --line:#e7e4e0; --gold:#F4B733; --chip:#f6eef0; --rim:#e8720f;
  --stageW:{{STAGE_W}}px; --stageH:{{STAGE_H}}px;
  font-family:'Barlow',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#0e0e11;overflow:hidden}
body{display:flex;align-items:center;justify-content:center}

#stage{position:relative;width:var(--stageW);height:var(--stageH);background:var(--bg);
  overflow:hidden;border-radius:14px;box-shadow:0 30px 90px rgba(0,0,0,.5);
  transform-origin:center center;perspective:1500px}
body.clean{background:#f4f3f1}
body.clean #stage{border-radius:0;box-shadow:none}

/* end-card confetti (shared pattern ŌĆö see social/README.md) */
#confetti{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:12;opacity:0}
.cf{position:absolute;left:0;top:0;will-change:transform,opacity}

#bg{position:absolute;inset:0;
  background:
    radial-gradient(120% 90% at 50% -12%, #ffffff 0%, rgba(255,255,255,0) 52%),
    radial-gradient(70% 70% at 8% 6%, rgba(196,18,48,.10) 0%, rgba(196,18,48,0) 46%),
    radial-gradient(70% 70% at 94% 96%, rgba(196,18,48,.12) 0%, rgba(196,18,48,0) 50%),
    linear-gradient(160deg,#f8f6f4 0%,#eeeae6 100%)}

.scene{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  will-change:transform,filter,opacity;backface-visibility:hidden;opacity:0}
.scene .wrap{position:relative;width:100%;height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center}
[data-anim]{opacity:0;will-change:transform,opacity}

/* shared type (identical across teasers ŌĆö see social/README.md ┬¦6) */
.wordmark{color:var(--red);display:block}
.wordmark svg{display:block;width:100%;height:auto}
.eyebrow{font-weight:800;letter-spacing:2.8px;text-transform:uppercase;color:var(--red);font-size:22px}
.sub{font-weight:700;color:var(--muted);font-size:30px;text-align:center;max-width:84%;line-height:1.25}
.redword{color:var(--red)}
.cta-url{font-weight:900;font-size:60px;color:var(--red);letter-spacing:-1px}
.cap{position:absolute;left:0;right:0;bottom:64px;text-align:center;font-weight:800;font-size:30px;color:var(--ink);z-index:15}
.cap .redword{color:var(--red)}

/* ŌöĆŌöĆ the court: the district silhouette itself IS the basket ŌĆö the ball
   dives directly into the shape from any direction, no separate hoop icon ŌöĆŌöĆ */
.court{position:relative;width:420px;height:420px;perspective:900px;
  filter:drop-shadow(0 20px 34px rgba(196,18,48,.15))}
#sil-svg{position:absolute;inset:0;width:100%;height:100%}
#sil-svg path{fill:var(--red)}
.entry-ring{position:absolute;left:50%;top:50%;width:64px;height:64px;border-radius:50%;
  border:6px solid var(--gold);transform:translate(-50%,-50%) scale(0);opacity:0;
  z-index:9;pointer-events:none;will-change:transform,opacity}
.ball-shadow{position:absolute;width:110px;height:30px;left:50%;top:50%;z-index:7;
  border-radius:50%;background:radial-gradient(closest-side,rgba(120,40,10,.36),rgba(120,40,10,0) 72%);
  opacity:0;will-change:transform,opacity}
.ball{position:absolute;width:92px;height:92px;left:50%;top:50%;z-index:8;
  opacity:0;will-change:transform,opacity,filter}
.ball-inner{width:100%;height:100%;display:block;object-fit:contain;will-change:transform}
/* "+1" ŌĆö a quick floating score popup right where the ball went in; pops in,
   holds briefly, then drifts up and fades (classic game score-popup). */
.scorepop{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:10;
  opacity:0;pointer-events:none;white-space:nowrap;will-change:transform,opacity}
.scorepop .plus1{font-weight:900;font-size:66px;color:var(--gold);letter-spacing:-1px;
  text-shadow:0 4px 0 rgba(0,0,0,.16)}

#controls{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:10px;
  align-items:center;z-index:1000;background:rgba(20,20,24,.86);backdrop-filter:blur(8px);
  border-radius:14px;padding:10px 14px;font-family:'Barlow',sans-serif}
body.clean #controls{display:none}
#controls button{font-family:inherit;font-weight:800;font-size:14px;border:0;border-radius:9px;padding:9px 15px;cursor:pointer;background:#2f2f36;color:#fff}
#controls button.primary{background:var(--red)}
#controls button:hover{filter:brightness(1.12)}
#controls .status{color:#c9c7cf;font-size:13px;font-weight:600;min-width:120px}
#hint-cue{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:1000;
  background:rgba(20,20,24,.8);color:#eee;font-weight:600;font-size:12.5px;padding:6px 12px;border-radius:8px}
body.clean #hint-cue{display:none}

/* portrait tuning */
body[data-aspect="9x16"] .wordmark[style]{width:840px!important}
body[data-aspect="9x16"] .sub{font-size:34px}
body[data-aspect="9x16"] .court{width:620px;height:620px}
body[data-aspect="9x16"] .ball{width:126px;height:126px}
body[data-aspect="9x16"] .ball-shadow{width:160px;height:42px}
body[data-aspect="9x16"] .entry-ring{width:84px;height:84px}
body[data-aspect="9x16"] .scorepop .plus1{font-size:88px}
body[data-aspect="9x16"] .cap{bottom:180px;font-size:38px}
body[data-aspect="9x16"] .cta-url{font-size:72px}

/* landscape tuning (1280├Ś720) */
body[data-aspect="16x9"] .wordmark[style]{width:560px!important}
body[data-aspect="16x9"] .eyebrow{font-size:17px}
body[data-aspect="16x9"] .sub{font-size:24px}
body[data-aspect="16x9"] .court{width:270px;height:270px}
body[data-aspect="16x9"] .ball{width:60px;height:60px}
body[data-aspect="16x9"] .ball-shadow{width:78px;height:20px}
body[data-aspect="16x9"] .entry-ring{width:42px;height:42px;border-width:4px}
body[data-aspect="16x9"] .scorepop .plus1{font-size:38px}
body[data-aspect="16x9"] .cta-url{font-size:48px}
body[data-aspect="16x9"] .cap{bottom:24px;font-size:22px}
</style>
</head>
<body data-aspect="{{ASPECT}}">

<div id="stage">
  <div id="bg"></div>
  <div id="confetti"></div>

  <!-- 1 ┬Ę INTRO (shared dynamic-intro pattern ŌĆö see social/README.md ┬¦6) -->
  <section class="scene" data-scene="intro">
    <div class="wrap">
      <span class="eyebrow" data-anim="slideL" data-d="0.05" data-exit="L">Nothing but net</span>
      <div class="wordmark" data-anim="zoomIn" data-d="0.18" data-exit="Z" style="width:760px;margin:24px 0 14px"><svg viewBox="0 0 260 56" role="img" aria-label="Daily District">{{WORDMARK}}</svg></div>
      <div class="sub" data-anim="slideR" data-d="0.42" data-exit="R">Sink the shot. <b class="redword">Name the district.</b></div>
    </div>
  </section>

  <!-- 2 ┬Ę HOOP ŌĆö the district itself is the basket; the ball dives straight
       into the shape from a different direction each shot. -->
  <section class="scene" data-scene="hoop">
    <div class="wrap">
      <span class="eyebrow" data-anim="rise" data-d="0.05" style="margin-bottom:10px">Take the shot</span>
      <div class="court" id="court">
        <svg id="sil-svg" viewBox="0 0 {{SIL_BOX}} {{SIL_BOX}}" aria-hidden="true"><path id="sil-path" d="{{SIL_PATH0}}"/></svg>
        <div class="entry-ring" id="entry-ring"></div>
        <div class="ball-shadow" id="ball-shadow"></div>
        <div class="ball" id="ball">
          <!-- Photoreal basketball (Freepik, by macrovector ŌĆö asset #10603057/
               42545; used under the project owner's Freepik premium license,
               isolated from its source photo with the baked-in drop shadow
               cropped out, since the promo renders its own shadow below). -->
          <img class="ball-inner" id="ball-inner" src="data:image/png;base64,{{BALL_IMG_B64}}" alt="" aria-hidden="true">
        </div>
        <div class="scorepop" id="scorepop"><span class="plus1">+1</span></div>
      </div>
    </div>
  </section>

  <!-- 3 ┬Ę CTA (shared confetti/hold pattern ŌĆö see social/README.md ┬¦6) -->
  <section class="scene" data-scene="cta">
    <div class="wrap">
      <div class="wordmark" data-anim="pop" data-d="0.05" style="width:620px;margin-bottom:22px"><svg viewBox="0 0 260 56" role="img" aria-label="Daily District">{{WORDMARK}}</svg></div>
      <div class="sub" data-anim="rise" data-d="0.22" style="color:var(--ink)">Play to <b class="redword">win.</b></div>
      <div class="cta-url" data-anim="pop" data-d="0.42" style="margin-top:16px">daily-district.com</div>
    </div>
  </section>
</div>

<div id="hint-cue">Ō¢Č Teaser #6 ┬Ę loop ┬Ę press <b>Record video</b> and share <b>This Tab</b> to export</div>
<div id="controls">
  <button class="primary" id="btn-rec">ŌŚÅ Record video</button>
  <button id="btn-restart">Ōå╗ Restart</button>
  <button id="btn-clean">Hide UI</button>
  <span class="status" id="status">{{STAGE_W}}├Ś{{STAGE_H}} ┬Ę teaser #6</span>
</div>

<script>/*{{FLUBBER_JS}}*/</script>
<script>
const easeOut=t=>1-Math.pow(1-t,3), easeIn=t=>t*t*t;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v)), lerp=(a,b,t)=>a+(b-a)*t;

// ŌöĆŌöĆ District line-up: silhouettes to morph through + a flubber interpolator
//    between each consecutive pair (same technique as teaser #4's learn beat). ŌöĆŌöĆ
const SIL_PATHS={{SIL_PATHS_JSON}}, DISTRICTS_META={{DISTRICTS_META_JSON}};
const N_SHOTS=SIL_PATHS.length;
const SIL_MORPH=[];
for(let i=0;i<SIL_PATHS.length-1;i++){ try{ SIL_MORPH[i]=flubber.interpolate(SIL_PATHS[i],SIL_PATHS[i+1]); }catch(e){ SIL_MORPH[i]=null; } }
const silPath=document.getElementById('sil-path');
const ball=document.getElementById('ball'), ballInner=document.getElementById('ball-inner'), ballShadow=document.getElementById('ball-shadow');
const entryRing=document.getElementById('entry-ring');
const scorepop=document.getElementById('scorepop');

// ŌöĆŌöĆ Per-shot timeline (all pure functions of scene-local time ŌåÆ deterministic
//    and fully seekable for render-mp4's frame-by-frame capture) ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
// Fast, rapid-fire pacing: quick dive, quick "+1" pop, quick morph into the
// next district ŌĆö built to feel energetic with a bigger district lineup.
const ARC_DUR=0.55;                    // ball flight time
// "+1": pop in ŌåÆ hold ŌåÆ then a slow float all the way to the top of the
// court, staying fully opaque for the first half of that rise and only
// fading out over the second half (so it reads clearly before it fades).
const POP_FADE=0.12, POP_HOLD=0.16, POP_RISE=0.55, POP_TOP_PCT=4;
const MORPH_START=ARC_DUR+POP_FADE+POP_HOLD+0.05;                      // morph starts right after the "+1" settles
const MORPH_DUR=0.35;
// Shot length must cover whichever finishes last ŌĆö the shape morph, or the
// "+1"'s full rise-to-the-top-and-fade ŌĆö so neither gets cut off.
const SHOT_DUR=Math.max(MORPH_START+MORPH_DUR, ARC_DUR+POP_FADE+POP_HOLD+POP_RISE)+0.05;
// Deterministic pseudo-random angle per shot (0ŌĆō360┬░) so the ball dives in
// from a different direction each time ŌĆö golden-angle spacing gives good
// spread even for a handful of shots.
function shotAngle(idx){ return (idx*222.49)%360; }
function arcPoint(t,sx,sy,px,py,ex,ey){
  const u=1-t;
  return [u*u*sx+2*u*t*px+t*t*ex, u*u*sy+2*u*t*py+t*t*ey];
}

// ŌöĆŌöĆ End-card confetti: fires part-way into the (held) CTA scene and keeps
//    falling through the hold, so the final frame is logo + confetti. ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
const SW={{STAGE_W}}, SH={{STAGE_H}};
const CONF_FIRE=2.0;                                   // s into the CTA scene
const CONF_COLORS=['#C41230','#2b6cb0','#2f9e44','#FDB515','#1a1a1a','#e64980','#ffffff'];
const confettiLayer=document.getElementById('confetti');
const CONFETTI=(function(){
  const arr=[]; let seed=1337; const rnd=()=>{seed=(seed*1103515245+12345)&0x7fffffff;return seed/0x7fffffff;};
  for(let i=0;i<72;i++){
    const el=document.createElement('div'); el.className='cf';
    const w=8+rnd()*12, h=8+rnd()*14;
    el.style.background=CONF_COLORS[i%CONF_COLORS.length];
    el.style.width=w.toFixed(1)+'px'; el.style.height=h.toFixed(1)+'px';
    el.style.borderRadius=(rnd()<0.3?'50%':'2px');
    confettiLayer.appendChild(el);
    arr.push({el, x0:-0.05*SW+rnd()*1.10*SW, y0:-0.12*SH-rnd()*0.10*SH,
      dist:SH*1.20+rnd()*0.1*SH, delay:rnd()*1.4, fall:2.0+rnd()*1.3,
      damp:12+rnd()*60, dfreq:1.4+rnd()*2.4, phase:rnd()*6.283,
      rot0:rnd()*360, spin:(rnd()-0.5)*720});
  }
  return arr;
})();
// Run the end card until every piece has landed, then hold the logo +3s more.
const CONF_END = CONF_FIRE + Math.max(...CONFETTI.map(c=>c.delay+c.fall));
const CTA_DUR = CONF_END + 3;
function renderConfetti(active, elapsed){
  if(!active){ if(confettiLayer.style.opacity!=='0') confettiLayer.style.opacity='0'; return; }
  confettiLayer.style.opacity='1';
  for(const c of CONFETTI){
    if(elapsed<c.delay){ c.el.style.opacity='0'; continue; }
    const p=clamp((elapsed-c.delay)/c.fall,0,1);
    const y=c.y0+c.dist*(0.35*p+0.65*p*p);
    const x=c.x0+Math.sin(elapsed*c.dfreq+c.phase)*c.damp;
    const rot=c.rot0+elapsed*c.spin;
    const op = p<0.12 ? p/0.12 : p>0.9 ? (1-p)/0.1 : 1;
    c.el.style.opacity=op.toFixed(2);
    c.el.style.transform=`translate3d(${x.toFixed(1)}px,${y.toFixed(1)}px,0) rotate(${rot.toFixed(1)}deg)`;
  }
}

const DEF=[
  {name:'intro', dur:2.7, ax:'y', dir: 1, scatterOut:true, dynamicIntro:true},
  {name:'hoop',  dur:SHOT_DUR*N_SHOTS, ax:'x', dir: 1, hoop:true},
  {name:'cta',   dur:CTA_DUR, ax:'x', dir:-1, hold:true},   // holds on the logo through the confetti, then +3s, no swipe-out
];
let acc=0; const SCENES=DEF.map(s=>{const o={...s,t0:acc,t1:acc+s.dur};acc+=s.dur;return o;});
const LOOP=acc;
const CTA=SCENES.find(s=>s.name==='cta');
const ENTER=0.5, EXIT=0.46, TRAVEL=560, BLURMAX=20, CHILD=0.5;

SCENES.forEach(s=>{
  s.el=document.querySelector(`.scene[data-scene="${s.name}"]`);
  s.kids=[...s.el.querySelectorAll('[data-anim]')].map(n=>({n,type:n.dataset.anim,d:parseFloat(n.dataset.d)||0,exit:n.dataset.exit}));
});

function revealKids(s,lt){
  for(const k of s.kids){ const p=easeOut(clamp((lt-k.d)/CHILD,0,1));
    let tf='', fl='';
    if(k.type==='pop')tf=`scale(${lerp(.72,1,p)})`;
    else if(k.type==='rise')tf=`translateY(${lerp(30,0,p)}px)`;
    else if(k.type==='slideL')tf=`translateX(${lerp(-180,0,p)}px)`;   // fly in from the left
    else if(k.type==='slideR')tf=`translateX(${lerp(180,0,p)}px)`;    // fly in from the right
    else if(k.type==='zoomIn'){ tf=`scale(${lerp(.25,1,p)})`; fl=`blur(${lerp(16,0,p).toFixed(1)}px)`; }  // rushes at the viewer
    k.n.style.opacity=p.toFixed(3); k.n.style.transform=tf;
    if(k.type==='zoomIn') k.n.style.filter=fl; }
}

// scatterOut scenes fly each child off in its own direction (data-exit: L/R/U/D)
// or zoom past the camera (Z) instead of the block sliding off as one piece.
const SCATTER_DUR=0.7, SCATTER_TRAVEL=820, SCATTER_ZOOM=5.5, SCATTER_ZBLUR=22;
function scatterKids(s,lt,dur){
  if(lt<=dur-SCATTER_DUR) return;
  const p=easeIn(clamp((lt-(dur-SCATTER_DUR))/SCATTER_DUR,0,1)), T=SCATTER_TRAVEL;
  for(const k of s.kids){ let x=0,y=0; const e=k.exit;
    if(e==='L')x=-T*p; else if(e==='R')x=T*p; else if(e==='U')y=-T*p; else if(e==='D')y=T*p;
    if(e==='Z'){ k.n.style.transform=`scale(${(1+p*SCATTER_ZOOM).toFixed(2)})`; k.n.style.filter=`blur(${(p*SCATTER_ZBLUR).toFixed(1)}px)`; }
    else k.n.style.transform=`translate3d(${x.toFixed(0)}px,${y.toFixed(0)}px,0)`;
    k.n.style.opacity=clamp(1-p*1.5,0,1).toFixed(3); }
}

let startTs=null, paused=false, pauseAt=0;
window.__teaser={seek:t=>{paused=true;pauseAt=((t%LOOP)+LOOP)%LOOP;},play:()=>{paused=false;startTs=null;},loop:()=>LOOP};

function frame(ts){
  if(startTs===null) startTs=ts;
  const t = paused ? pauseAt : ((ts-startTs)/1000)%LOOP;
  for(const s of SCENES){
    const el=s.el, lt=t-s.t0, dur=s.t1-s.t0;
    if(t<s.t0-0.02 || t>=s.t1+0.02){ el.style.opacity='0'; el.style.filter='none'; continue; }
    let x=0,y=0,sc=1,bl=0,op=1,ry=0;
    if(lt<ENTER){ const p=easeOut(clamp(lt/ENTER,0,1)); const off=s.dynamicIntro?0:(1-p)*TRAVEL*s.dir;
      if(s.ax==='x')x=off; else y=off*0.7; sc=1.08-0.08*p; bl=BLURMAX*(1-p); op=clamp(p*1.6,0,1); ry=(s.ax==='x')?s.dir*8*(1-p):0; }
    else if(s.hold){ /* settle and hold ŌĆö static logo, never swipes out (confetti scene) */ }
    else if(s.scatterOut){ /* block holds still & opaque; children fly off individually */ }
    else if(lt>dur-EXIT){ const p=easeIn(clamp((lt-(dur-EXIT))/EXIT,0,1)); const off=-p*TRAVEL*s.dir;
      if(s.ax==='x')x=off; else y=off*0.7; sc=1-0.05*p; bl=BLURMAX*p; op=clamp(1-p*1.35,0,1); ry=(s.ax==='x')?-s.dir*9*p:0; }
    else { const hp=(lt-ENTER)/(dur-ENTER-EXIT); sc=1+0.026*hp; y=-6*hp; }
    el.style.opacity=op.toFixed(3);
    el.style.filter = bl>0.05?`blur(${bl.toFixed(1)}px)`:'none';
    el.style.transform=`translate3d(${x.toFixed(1)}px,${y.toFixed(1)}px,0) scale(${sc.toFixed(3)}) rotateY(${ry.toFixed(1)}deg)`;
    revealKids(s,lt);
    if(s.scatterOut) scatterKids(s,lt,dur);

    if(s.hoop){
      // Clamp both bounds ŌĆö lt can be a hair negative right at the scene's
      // entry boundary (float rounding inside the -0.02 grace window), and an
      // un-floored Math.floor() there yields -1, which crashed on
      // DISTRICTS_META[-1] and silently killed the rAF loop for the rest of
      // the video (only the intro would ever show).
      const shotIdx=Math.max(0, Math.min(N_SHOTS-1, Math.floor(lt/SHOT_DUR)));
      const shotLt=Math.max(0, lt-shotIdx*SHOT_DUR);
      const isLast=shotIdx===N_SHOTS-1;

      const meta=DISTRICTS_META[shotIdx];
      const tcx=meta.cx, tcy=meta.cy;   // this district's actual visual centroid ŌĆö the "basket"

      // Shape: static on its own silhouette, then flubber-morphs into the next
      // district starting at MORPH_START (the last shot never morphs ŌĆö nothing
      // left to morph into, so it just holds).
      if(!isLast && shotLt>=MORPH_START){
        const p=easeOut(clamp((shotLt-MORPH_START)/MORPH_DUR,0,1));
        const mrp=SIL_MORPH[shotIdx];
        silPath.setAttribute('d', mrp?mrp(p):SIL_PATHS[shotIdx+1]);
      } else {
        silPath.setAttribute('d', SIL_PATHS[shotIdx]);
      }

      // Ball: dives in from a different direction each shot (golden-angle
      // spacing around the district), on a slightly curved path converging on
      // the shape's actual centroid ŌĆö the district itself is the basket, so
      // there's no separate hoop/rim to aim at. Grows toward the viewer
      // through the first half (3D "coming at you"), then shrinks to near-
      // nothing and tips away in perspective as it sinks INTO the shape.
      if(shotLt<ARC_DUR){
        const ta=shotLt/ARC_DUR;
        const ang=shotAngle(shotIdx)*Math.PI/180, R=95;
        const sx=tcx+Math.cos(ang)*R, sy=tcy+Math.sin(ang)*R;
        const dx=tcx-sx, dy=tcy-sy, len=Math.hypot(dx,dy)||1;
        const perpx=-dy/len, perpy=dx/len, bend=(shotIdx%2?1:-1)*16;
        const cpx=(sx+tcx)/2+perpx*bend, cpy=(sy+tcy)/2+perpy*bend;
        const [bx,by]=arcPoint(ta, sx,sy, cpx,cpy, tcx,tcy);
        const scale = ta<0.55 ? lerp(0.18,1.42,easeOut(ta/0.55)) : lerp(1.42,0.05,easeIn((ta-0.55)/0.45));
        const op2 = ta<0.06 ? ta/0.06 : (ta>0.97 ? (1-ta)/0.03 : 1);
        const blur = (1-Math.sin(ta*Math.PI))*2.4;
        const tiltX = ta>0.55 ? lerp(0,55,easeIn((ta-0.55)/0.45)) : 0;   // tips away as it dives in
        ball.style.left=bx.toFixed(2)+'%'; ball.style.top=by.toFixed(2)+'%';
        ball.style.transform=`translate(-50%,-50%) scale(${scale.toFixed(3)}) rotateX(${tiltX.toFixed(1)}deg)`;
        ball.style.opacity=op2.toFixed(3);
        // Blur lives on the flat inner image (pre-tilt), not the 3D-tilted
        // wrapper ŌĆö blurring a layer that itself carries a rotateX transform
        // produces a GPU sampling streak across the ball during the dive-in
        // tilt; applying it before that transform avoids it.
        ballInner.style.transform=`rotate(${(shotLt*620).toFixed(0)}deg)`;
        ballInner.style.filter=blur>0.05?`blur(${blur.toFixed(1)}px)`:'none';
        // Contact shadow ŌĆö trails just under/behind the ball, fading out as
        // the ball vanishes into the shape (a cheap but effective grounding
        // cue for the 3D read).
        ballShadow.style.left=bx.toFixed(2)+'%'; ballShadow.style.top=(by+2).toFixed(2)+'%';
        ballShadow.style.transform=`translate(-50%,-50%) scale(${(scale*0.85).toFixed(3)})`;
        ballShadow.style.opacity=(op2*lerp(0.15,0.55,ta)*(1-Math.max(0,ta-0.85)/0.15)).toFixed(3);
      } else {
        ball.style.opacity='0'; ballShadow.style.opacity='0';
      }

      // Entry ring ŌĆö a quick pulse right where the ball sank into the district.
      if(shotLt>=ARC_DUR && shotLt<ARC_DUR+POP_FADE){
        const p=clamp((shotLt-ARC_DUR)/POP_FADE,0,1);
        entryRing.style.left=tcx+'%'; entryRing.style.top=tcy+'%';
        entryRing.style.opacity=(1-p).toFixed(3);
        entryRing.style.transform=`translate(-50%,-50%) scale(${lerp(0.3,2.4,p).toFixed(3)})`;
      } else { entryRing.style.opacity='0'; }

      // "+1" ŌĆö a quick floating score popup right at the impact point: pops
      // in, holds briefly, then floats all the way up to the top of the
      // court, staying fully readable through the first half of that climb
      // and only fading out over the second half (same beat on every shot,
      // including the last ŌĆö it always floats away on its own).
      let popOp=0, popScale=0.6, popTop=tcy;
      if(shotLt>=ARC_DUR){
        const pl=shotLt-ARC_DUR;
        if(pl<POP_FADE){ const p=easeOut(clamp(pl/POP_FADE,0,1)); popOp=p; popScale=lerp(0.5,1,p); }
        else if(pl<POP_FADE+POP_HOLD){ popOp=1; popScale=1; }
        else if(pl<POP_FADE+POP_HOLD+POP_RISE){
          const p=easeOut(clamp((pl-POP_FADE-POP_HOLD)/POP_RISE,0,1));
          popTop=lerp(tcy,POP_TOP_PCT,p); popScale=1;
          popOp = p<0.5 ? 1 : 1-easeIn(clamp((p-0.5)/0.5,0,1));
        } else { popOp=0; popScale=1; popTop=POP_TOP_PCT; }
      }
      scorepop.style.left=tcx+'%'; scorepop.style.top=popTop.toFixed(2)+'%';
      scorepop.style.opacity=popOp.toFixed(3);
      scorepop.style.transform=`translate(-50%, -50%) scale(${popScale.toFixed(3)})`;
    }
  }
  // End-card confetti ŌĆö driven purely by the CTA scene's local time (so it's
  // deterministic under render-mp4's frame-by-frame seek).
  const ctaLt=t-CTA.t0, ctaOn=(t>=CTA.t0-0.02 && t<CTA.t1+0.02);
  renderConfetti(ctaOn && ctaLt>=CONF_FIRE, ctaLt-CONF_FIRE);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

const statusEl=document.getElementById('status');
document.getElementById('btn-restart').onclick=()=>{startTs=null;paused=false;};
document.getElementById('btn-clean').onclick=()=>{document.body.classList.toggle('clean');fit();};
window.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault(); if(paused){paused=false;startTs=performance.now()-pauseAt*1000;} else {paused=true;pauseAt=((performance.now()-(startTs||performance.now()))/1000)%LOOP;}}
  if(e.key==='r'||e.key==='R'){startTs=null;paused=false;}
  if(e.key==='h'||e.key==='H'){document.body.classList.toggle('clean');fit();}
});

let rec, chunks=[];
document.getElementById('btn-rec').onclick=async ()=>{
  try{
    statusEl.textContent='Choose ŌĆ£This TabŌĆØŌĆ”';
    const stream=await navigator.mediaDevices.getDisplayMedia({video:{frameRate:30,width:{{STAGE_W}},height:{{STAGE_H}}},audio:false,preferCurrentTab:true});
    document.body.classList.add('clean'); fit(); startTs=null; paused=false; chunks=[];
    const mime=MediaRecorder.isTypeSupported('video/mp4')?'video/mp4':MediaRecorder.isTypeSupported('video/webm;codecs=vp9')?'video/webm;codecs=vp9':'video/webm';
    rec=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:12_000_000});
    rec.ondataavailable=e=>{if(e.data.size)chunks.push(e.data);};
    rec.onstop=()=>{stream.getTracks().forEach(t=>t.stop());
      const blob=new Blob(chunks,{type:mime});const a=document.createElement('a');
      a.href=URL.createObjectURL(blob);a.download='daily-district-teaser-6.'+(mime.includes('mp4')?'mp4':'webm');a.click();
      document.body.classList.remove('clean');fit();statusEl.textContent='Saved '+a.download;};
    rec.start();
    const total=Math.round(LOOP*1000)+300; let left=Math.ceil(total/1000);
    statusEl.textContent='ŌŚÅ Recording '+left+'sŌĆ”';
    const iv=setInterval(()=>{left--;statusEl.textContent='ŌŚÅ Recording '+left+'sŌĆ”';},1000);
    setTimeout(()=>{clearInterval(iv);if(rec&&rec.state!=='inactive')rec.stop();},total);
    stream.getVideoTracks()[0].onended=()=>{if(rec&&rec.state!=='inactive')rec.stop();};
  }catch(err){statusEl.textContent='Record cancelled';document.body.classList.remove('clean');fit();}
};

function fit(){
  const pad=document.body.classList.contains('clean')?0:56;
  const s=Math.min(1,(window.innerWidth-pad)/{{STAGE_W}},(window.innerHeight-pad)/{{STAGE_H}});
  document.getElementById('stage').style.transform=`scale(${s})`;
}
window.addEventListener('resize',fit); fit();
if(document.fonts&&document.fonts.ready){document.fonts.ready.then(fit);}
