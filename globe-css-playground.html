<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hex-tile globe loader (CSS/SVG) — playground</title>
<style>
  :root{ --red:#C41230; --iron:#6D6E71; --steel:#E0E0E0; }
  *{ box-sizing:border-box; }
  body{ margin:0; min-height:100vh; background:#f0efed; color:var(--iron);
    font:14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  .page{ max-width:920px; margin:0 auto; padding:2rem 1.25rem 4rem; }
  h1{ font-size:18px; font-weight:600; color:#000; margin:0 0 1.5rem; }
  .grid{ display:grid; grid-template-columns:320px 1fr; gap:2rem; align-items:start; }
  @media (max-width:760px){ .grid{ grid-template-columns:1fr; } }
  .stage{ background:#fff; border:1px solid var(--steel); border-radius:14px;
    display:flex; align-items:center; justify-content:center; padding:2rem; min-height:320px; position:relative; }
  .stage.dark-mode{ background:#000; }
  .toggle-bg{ position:absolute; top:10px; right:12px; font-size:12px; color:var(--iron);
    background:transparent; border:1px solid var(--steel); border-radius:7px; padding:4px 9px; cursor:pointer; }
  .stage.dark-mode .toggle-bg{ color:var(--steel); border-color:#333; }
  .controls{ display:flex; flex-direction:column; gap:14px; }
  .ctrl{ display:flex; flex-direction:column; gap:5px; }
  .ctrl label{ font-size:12px; font-weight:500; color:#000; display:flex; justify-content:space-between; }
  .ctrl label .val{ color:var(--iron); font-weight:400; }
  select, input[type=range]{ width:100%; }
  select{ padding:6px 8px; border:1px solid var(--steel); border-radius:8px; background:#fff; color:#000; font:inherit; }
  .swatches{ display:flex; gap:7px; flex-wrap:wrap; }
  .swatches button{ width:24px; height:24px; padding:0; border-radius:50%; border:1px solid var(--steel); cursor:pointer; }
  .swatches button[aria-pressed=true]{ outline:2px solid #000; outline-offset:2px; }
  .swatch-none{ background:
    linear-gradient(45deg, transparent 46%, #e33 48%, #e33 52%, transparent 54%),
    repeating-conic-gradient(#fff 0% 25%, #eee 0% 50%) 0 0/8px 8px; }
  .thread-swatches button{ border-radius:7px; width:auto; height:24px; padding:0 8px; font-size:11px; color:#fff;
    display:flex; align-items:center; justify-content:center; opacity:.45; }
  .thread-swatches button[aria-pressed=true]{ opacity:1; outline:2px solid #000; outline-offset:1px; }
  .config{ grid-column:1 / -1; margin-top:1.5rem; background:#fff; border:1px solid var(--steel);
    border-radius:12px; padding:14px 16px; }
  .config h2{ font-size:12px; text-transform:uppercase; letter-spacing:.04em; margin:0 0 8px; color:var(--iron); }
  .config pre{ margin:0; font-family:ui-monospace, SFMono-Regular, Menlo, monospace; font-size:12.5px; color:#000;
    white-space:pre-wrap; word-break:break-all; }
  .copy{ margin-top:10px; font-size:12px; padding:6px 12px; border-radius:8px; border:0; background:var(--red); color:#fff; cursor:pointer; }

  /* ============================================================
     Verbatim copy of the app's .globe-loader CSS (style.css) — the hex tiles
     are SVG <polygon>s generated below, mirroring globeLoader() in script.js.
     ============================================================ */
  .globe-loader {
    --size: 96px;
    --red: #C41230;
    --roll: 20deg;
    width: var(--size); height: var(--size);
    position: relative; border-radius: 50%; overflow: hidden;
    display: inline-block; vertical-align: middle;
  }
  .globe-loader svg.tiles,
  .globe-loader svg.shade {
    position: absolute; inset: -20%;
    width: 140%; height: 140%; display: block; overflow: visible;
    transform: rotate(var(--roll));
    -webkit-mask: radial-gradient(circle at 50% 50%, #000 58%, transparent 90%);
            mask: radial-gradient(circle at 50% 50%, #000 58%, transparent 90%);
  }
  .globe-loader .tiles polygon {
    fill: var(--red); opacity: 0;
    animation: gl-fill var(--gl-duration, 2.6s) linear infinite;
    transform-box: fill-box; transform-origin: center;
    will-change: opacity, transform;
  }
  /* Neither layer uses a stroke — the tile gap (rDraw shrink) already separates hexes,
     so tiles and shade read the same gap size without needing a matching stroke. */
  .globe-loader svg.shade { pointer-events: none; }
  .globe-loader .shade polygon { fill: var(--shade-light, #ccc); }
  .dark-mode .globe-loader .shade polygon { fill: var(--shade-dark, #1a1a1a); }
  @keyframes gl-fill {
    0%   { opacity: 0; transform: scale(.55); }
    7%   { opacity: 1; transform: scale(1); }
    60%  { opacity: 1; transform: scale(1); }
    74%  { opacity: 0; transform: scale(.55); }
    100% { opacity: 0; transform: scale(.55); }
  }
  @media (prefers-reduced-motion: reduce) { .globe-loader .tiles polygon { animation-play-state: paused; } }
</style>
</head>
<body>
  <div class="page">
    <h1>Hex-tile globe loader (CSS/SVG) — every option is a knob</h1>
    <div class="grid">
      <div class="controls">
        <div class="ctrl"><label for="cols">Hex density (cols) <span class="val" id="colsV">25</span></label>
          <input type="range" id="cols" min="8" max="40" step="1" value="25"></div>
        <div class="ctrl"><label for="gap">Tile gap <span class="val" id="gapV">0.14</span></label>
          <input type="range" id="gap" min="0" max="0.35" step="0.01" value="0.14"></div>
        <div class="ctrl"><label for="roll">Cant / roll <span class="val" id="rollV">20°</span></label>
          <input type="range" id="roll" min="-45" max="45" step="1" value="20"></div>
        <div class="ctrl"><label for="duration">Fill-sweep duration <span class="val" id="durationV">4.0s</span></label>
          <input type="range" id="duration" min="1" max="5" step="0.1" value="4.0"></div>
        <div class="ctrl"><label for="threadProb">Tartan thread probability <span class="val" id="threadProbV">0.50</span></label>
          <input type="range" id="threadProb" min="0" max="0.75" step="0.01" value="0.50"></div>
        <div class="ctrl"><label for="vignette">Vignette strength <span class="val" id="vignetteV">0.55</span></label>
          <input type="range" id="vignette" min="0" max="1" step="0.05" value="0.55"></div>
        <div class="ctrl"><label>Base color</label>
          <div class="swatches" id="baseSwatches">
            <button data-c="#C41230" aria-pressed="true"  style="background:#C41230" title="Carnegie Red"></button>
            <button data-c="#FDB515" aria-pressed="false" style="background:#FDB515" title="Gold Thread"></button>
            <button data-c="#009647" aria-pressed="false" style="background:#009647" title="Green Thread"></button>
            <button data-c="#008F91" aria-pressed="false" style="background:#008F91" title="Teal Thread"></button>
            <button data-c="#007BC0" aria-pressed="false" style="background:#007BC0" title="Highlands Sky Blue"></button>
            <button data-c="#000000" aria-pressed="false" style="background:#000000" title="Black"></button>
          </div></div>
        <div class="ctrl"><label>Tartan thread colors (toggle to include)</label>
          <div class="swatches thread-swatches" id="threadSwatches">
            <button data-c="#c41230" aria-pressed="true"  style="background:#c41230">Aa</button>
            <button data-c="#a00a28" aria-pressed="true"  style="background:#a00a28">Aa</button>
            <button data-c="#820519" aria-pressed="true"  style="background:#820519">Aa</button>
            <button data-c="#6e0415" aria-pressed="true"  style="background:#6e0415">Aa</button>
            <button data-c="#dc506e" aria-pressed="true" style="background:#dc506e">Aa</button>
            <button data-c="#f0788c" aria-pressed="true" style="background:#f0788c">Aa</button>
            <button data-c="#FDB515" aria-pressed="true" style="background:#FDB515">Aa</button>
          </div></div>
        <div class="ctrl"><label>Background shade — light bg</label>
          <div class="swatches" id="shadeLightSwatches">
            <button data-c="none" aria-pressed="true" class="swatch-none" title="None (transparent — shade layer off)">∅</button>
            <button data-c="#cccccc" aria-pressed="false"  style="background:#cccccc" title="Default gray"></button>
            <button data-c="#b9bcc4" aria-pressed="false" style="background:#b9bcc4" title="Cool gray"></button>
            <button data-c="#d8cfc2" aria-pressed="false" style="background:#d8cfc2" title="Warm gray"></button>
            <button data-c="#c9d6dd" aria-pressed="false" style="background:#c9d6dd" title="Steel blue"></button>
            <button data-c="#000000" aria-pressed="false" style="background:#000000" title="Black"></button>
          </div>
          <input type="text" id="shadeLightCustom" placeholder="#hex or none" style="margin-top:6px;padding:4px 6px;border:1px solid var(--steel);border-radius:6px;font:inherit;color:#000;width:100%"></div>
        <div class="ctrl"><label>Background shade — dark bg</label>
          <div class="swatches" id="shadeDarkSwatches">
            <button data-c="none" aria-pressed="true" class="swatch-none" title="None (transparent — shade layer off)">∅</button>
            <button data-c="#1a1a1a" aria-pressed="false"  style="background:#1a1a1a" title="Default gray"></button>
            <button data-c="#0d0f14" aria-pressed="false" style="background:#0d0f14" title="Cool black"></button>
            <button data-c="#1f1815" aria-pressed="false" style="background:#1f1815" title="Warm black"></button>
            <button data-c="#12181c" aria-pressed="false" style="background:#12181c" title="Steel blue"></button>
            <button data-c="#ffffff" aria-pressed="false" style="background:#ffffff" title="White"></button>
          </div>
          <input type="text" id="shadeDarkCustom" placeholder="#hex or none" style="margin-top:6px;padding:4px 6px;border:1px solid var(--steel);border-radius:6px;font:inherit;color:#000;width:100%"></div>
      </div>

      <div class="stage" id="stage">
        <button class="toggle-bg" id="bgToggle">dark bg</button>
        <div id="globeHost"></div>
      </div>

      <div class="config">
        <h2>Drop-in constants for globeLoader() (script.js) + CSS (style.css)</h2>
        <pre id="config"></pre>
        <button class="copy" id="copy">Copy</button>
      </div>
    </div>
  </div>

<script>
/* ============================================================
   Reimplementation of globeLoader() from script.js, parameterized so every
   constant it currently hardcodes (cols, gap/rDraw shrink, thread palette +
   probability, roll, animation duration, vignette strength) is a live knob.
   The "Drop-in constants" box below emits the exact block to paste back into
   script.js/style.css once you land on values you like.
   ============================================================ */
function buildGlobeSVG(opts) {
  const { size, cols, gap, roll, threadProb, threads, baseColor, vignette } = opts;
  const rDrawFactor = 1 - gap;
  const spacingX = 100 / cols;
  const r = spacingX / Math.sqrt(3);
  const rDraw = r * rDrawFactor;
  const spacingY = 1.5 * r;

  const hexPoints = (cx, cy) => {
    let pts = '';
    for (let i = 0; i < 6; i++) {
      const ang = (-90 + i * 60) * Math.PI / 180;
      pts += `${(cx + rDraw * Math.cos(ang)).toFixed(2)},${(cy + rDraw * Math.sin(ang)).toFixed(2)} `;
    }
    return pts.trim();
  };

  let tiles = '', shade = '', rowIdx = 0;
  for (let y = -20; y <= 120; y += spacingY, rowIdx++) {
    const xOff = (rowIdx % 2) ? spacingX / 2 : 0;
    for (let x = -20 - spacingX; x <= 120 + spacingX; x += spacingX) {
      const cx = x + xOff;
      const pts = hexPoints(cx, y);
      const u = cx / 100, v = y / 100;
      const sweep = (1 - u) + v;
      const delay = -(0.55 * sweep + Math.random() * 0.12);
      const fill = (threads.length && Math.random() < threadProb)
        ? threads[(Math.random() * threads.length) | 0] : baseColor;
      tiles += `<polygon points="${pts}" style="fill:${fill};animation-delay:${delay.toFixed(3)}s"/>`;

      const dx = cx - 50, dy = y - 50;
      const dist = Math.hypot(dx, dy) / 60;
      const op = Math.max(0, Math.min(1, (dist - 0.25) / 0.55)) * vignette;
      if (op > 0.01) shade += `<polygon points="${pts}" style="opacity:${op.toFixed(3)}"/>`;
    }
  }
  return `<span class="globe-loader" role="status" aria-label="Loading" style="--size:${size}px;--gl-duration:${opts.duration}s;">`
    + `<svg class="tiles" viewBox="0 0 100 100" preserveAspectRatio="none">${tiles}</svg>`
    + `<svg class="shade" viewBox="0 0 100 100" preserveAspectRatio="none">${shade}</svg>`
    + `</span>`;
}

(function(){
  function num(id){ return parseFloat(document.getElementById(id).value); }
  const host = document.getElementById('globeHost');
  const stage = document.getElementById('stage');

  let baseColor = '#C41230';
  let threads = ['#c41230', '#a00a28', '#820519', '#6e0415', '#dc506e', '#f0788c', '#FDB515'];
  let shadeLight = 'none';
  let shadeDark = 'none';

  function currentOpts(){
    return {
      size: 240,
      cols: num('cols'),
      gap: num('gap'),
      roll: num('roll'),
      duration: num('duration'),
      threadProb: num('threadProb'),
      vignette: num('vignette'),
      threads, baseColor,
    };
  }

  function render(){
    const opts = currentOpts();
    host.innerHTML = buildGlobeSVG(opts);
    host.style.setProperty('--red', baseColor);
    // --red/--shade-* are read from .globe-loader itself (inline style sets
    // --size/--gl-duration only), so set them on the generated span directly.
    const span = host.querySelector('.globe-loader');
    if (span) {
      span.style.setProperty('--red', baseColor);
      span.style.setProperty('--shade-light', shadeLight);
      span.style.setProperty('--shade-dark', shadeDark);
    }
  }

  function updateLabels(){
    document.getElementById('colsV').textContent = num('cols');
    document.getElementById('gapV').textContent = num('gap').toFixed(2);
    document.getElementById('rollV').textContent = num('roll') + '°';
    document.getElementById('durationV').textContent = num('duration').toFixed(1) + 's';
    document.getElementById('threadProbV').textContent = num('threadProb').toFixed(2);
    document.getElementById('vignetteV').textContent = num('vignette').toFixed(2);
  }

  function updateConfig(){
    const opts = currentOpts();
    const threadsLit = '[' + threads.map(c => `'${c}'`).join(', ') + ']';
    const code =
`// style.css
.globe-loader .tiles polygon {
  animation: gl-fill ${opts.duration}s linear infinite;
}
.globe-loader { --roll: ${opts.roll}deg; }
.globe-loader .shade polygon { fill: ${shadeLight}; }
body.dark-mode .globe-loader .shade polygon { fill: ${shadeDark}; }
@media (prefers-color-scheme: dark) { body:not(.light-mode) .globe-loader .shade polygon { fill: ${shadeDark}; } }

// script.js
const GLOBE_THREADS = ${threadsLit};
const GLOBE_THREAD_PROB = ${opts.threadProb};
function globeLoader(size = 96) {
  const cols = ${opts.cols};                // hex centers per row
  const rDraw = r * ${(1 - opts.gap).toFixed(2)};   // tile gap shrink (r * (1 - gap))
  const baseColor = '${opts.baseColor}';    // var(--red)
  // vignette max opacity: ${opts.vignette}
  ...
}`;
    document.getElementById('config').textContent = code;
  }

  function apply(){ render(); updateLabels(); updateConfig(); }

  ['cols','gap','roll','duration','threadProb','vignette']
    .forEach(id => document.getElementById(id).addEventListener('input', apply));

  document.getElementById('baseSwatches').addEventListener('click', (e) => {
    const b = e.target.closest('button'); if (!b) return;
    document.querySelectorAll('#baseSwatches button').forEach(x => x.setAttribute('aria-pressed', x === b));
    baseColor = b.dataset.c;
    apply();
  });

  document.getElementById('threadSwatches').addEventListener('click', (e) => {
    const b = e.target.closest('button'); if (!b) return;
    const on = b.getAttribute('aria-pressed') === 'true';
    b.setAttribute('aria-pressed', String(!on));
    threads = [...document.querySelectorAll('#threadSwatches button[aria-pressed="true"]')].map(x => x.dataset.c);
    apply();
  });

  document.getElementById('shadeLightSwatches').addEventListener('click', (e) => {
    const b = e.target.closest('button'); if (!b) return;
    document.querySelectorAll('#shadeLightSwatches button').forEach(x => x.setAttribute('aria-pressed', x === b));
    shadeLight = b.dataset.c;
    document.getElementById('shadeLightCustom').value = '';
    apply();
  });
  document.getElementById('shadeLightCustom').addEventListener('input', (e) => {
    const v = e.target.value.trim();
    if (!/^(#[0-9a-fA-F]{3,8}|none)$/i.test(v)) return;
    document.querySelectorAll('#shadeLightSwatches button').forEach(x => x.setAttribute('aria-pressed', 'false'));
    shadeLight = v;
    apply();
  });

  document.getElementById('shadeDarkSwatches').addEventListener('click', (e) => {
    const b = e.target.closest('button'); if (!b) return;
    document.querySelectorAll('#shadeDarkSwatches button').forEach(x => x.setAttribute('aria-pressed', x === b));
    shadeDark = b.dataset.c;
    document.getElementById('shadeDarkCustom').value = '';
    apply();
  });
  document.getElementById('shadeDarkCustom').addEventListener('input', (e) => {
    const v = e.target.value.trim();
    if (!/^(#[0-9a-fA-F]{3,8}|none)$/i.test(v)) return;
    document.querySelectorAll('#shadeDarkSwatches button').forEach(x => x.setAttribute('aria-pressed', 'false'));
    shadeDark = v;
    apply();
  });

  document.getElementById('bgToggle').addEventListener('click', function(){
    stage.classList.toggle('dark-mode');
    this.textContent = stage.classList.contains('dark-mode') ? 'light bg' : 'dark bg';
  });

  document.getElementById('copy').addEventListener('click', function(){
    const txt = document.getElementById('config').textContent;
    if (navigator.clipboard) navigator.clipboard.writeText(txt);
    const b = this; b.textContent = 'Copied'; setTimeout(() => { b.textContent = 'Copy'; }, 1200);
  });

  apply();
})();
</script>
</body>
</html>
